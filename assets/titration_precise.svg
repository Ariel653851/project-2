<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Potence / Stand -->
  <rect x="160" y="80" width="8" height="380" fill="#94a3b8" />
  <rect x="100" y="450" width="160" height="10" fill="#94a3b8" />
  
  <!-- Clamp -->
  <rect x="160" y="180" width="40" height="6" fill="#64748b" />
  <rect x="180" y="175" width="4" height="16" fill="#475569" />

  <!-- Burette -->
  <rect x="190" y="40" width="12" height="300" fill="white" stroke="#334155" stroke-width="1.5" />
  <!-- Purple Liquid inside burette -->
  <rect x="191" y="90" width="10" height="250" fill="#a855f7" opacity="0.6" />
  <!-- Graduations -->
  <line x1="190" y1="60" x2="195" y2="60" stroke="#334155" stroke-width="1" />
  <line x1="190" y1="80" x2="195" y2="80" stroke="#334155" stroke-width="1" />
  <line x1="190" y1="100" x2="198" y2="100" stroke="#334155" stroke-width="1" />
  <!-- Tip -->
  <path d="M190 340 L202 340 L196 360 Z" fill="white" stroke="#334155" />
  <circle cx="196" cy="350" r="3" fill="#ef4444" /> <!-- Valve -->

  <!-- Agitateur Magnétique -->
  <rect x="140" y="410" width="80" height="40" rx="4" fill="#1e3a8a" />
  <rect x="150" y="435" width="10" height="10" rx="5" fill="white" opacity="0.5" />
  <rect x="190" y="435" width="20" height="8" rx="4" fill="white" />

  <!-- Erlenmeyer -->
  <path d="M165 410 L215 410 L200 370 L200 360 L180 360 L180 370 Z" fill="white" stroke="#334155" stroke-width="1.5" />
  <!-- Blue Liquid inside Erlen -->
  <path d="M170 410 L210 410 L205 385 L175 385 Z" fill="#3b82f6" opacity="0.5" />
  <!-- Barreau aimanté -->
  <rect x="180" y="402" width="20" height="4" rx="2" fill="black" />

  <!-- LABELS & ARROWS (Stylisées pour correspondre au PDF) -->
  <style>
    .label { font-family: sans-serif; font-size: 11px; font-weight: bold; fill: #1e293b; }
    .arrow { stroke: #1e293b; stroke-width: 1; fill: none; }
  </style>

  <!-- Burette graduée -->
  <path d="M185 100 L140 100" class="arrow" marker-end="url(#arrowhead)" />
  <text x="135" y="105" text-anchor="end" class="label">Burette graduée</text>

  <!-- Solution titrante -->
  <path d="M205 120 L280 120" class="arrow" marker-end="url(#arrowhead)" />
  <text x="285" y="125" class="label">Solution titrante</text>

  <!-- Potence -->
  <path d="M155 300 L120 300" class="arrow" marker-end="url(#arrowhead)" />
  <text x="115" y="305" text-anchor="end" class="label">Potence</text>

  <!-- Erlenmeyer -->
  <path d="M175 380 L130 380" class="arrow" marker-end="url(#arrowhead)" />
  <text x="125" y="385" text-anchor="end" class="label">Erlenmeyer</text>

  <!-- Barreau Aimanté -->
  <path d="M175 405 L130 405" class="arrow" marker-end="url(#arrowhead)" />
  <text x="125" y="410" text-anchor="end" class="label">Barreau aimanté</text>

  <!-- Agitateur magnétique -->
  <path d="M135 435 L90 435" class="arrow" marker-end="url(#arrowhead)" />
  <text x="85" y="440" text-anchor="end" class="label">Agitateur magnétique</text>

  <!-- Solution Titrée -->
  <path d="M215 390 L280 390" class="arrow" marker-end="url(#arrowhead)" />
  <text x="285" y="395" class="label">Solution titrée</text>

  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="0" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#1e293b" />
    </marker>
  </defs>
</svg>
